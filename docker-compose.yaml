
services:

  postgres:
    image: postgres:latest
    container_name: converse-ktor-postgres
    restart: unless-stopped
    ports:
      - "5000:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: converse-ktor-db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: converse-ktor-redis
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "6000:6379"
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  postgres-data:
  redis-data: