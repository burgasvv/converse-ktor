
ktor:
  deployment:
    port: 9000
  postgres:
    driver: org.postgresql.Driver
    url: 'jdbc:postgresql://localhost:5000/converse-ktor-db'
    username: postgres
    password: postgres
  redis:
    host: 'localhost'
    port: 6000
  application:
    modules:
      - org.burgas.serialization.SerializationKt.configureSerialization
      - org.burgas.security.SecurityKt.configureSecurity
      - org.burgas.database.DatabaseKt.configureDatabase
      - org.burgas.websocket.WebSocketKt.configureWebSocket
      - org.burgas.router.SecurityRouterKt.configureSecurityRouter
      - org.burgas.router.FileRouterKt.configureFileRouter
      - org.burgas.router.IdentityRouterKt.configureIdentityRouter
      - org.burgas.router.DialogueRouterKt.configureDialogueRouter
      - org.burgas.router.DialogueMessageRouterKt.configureDialogueMessageRouter
      - org.burgas.router.ChatRouterKt.configureChatRouter
      - org.burgas.router.ChatMessageRouterKt.configureChatMessageRouter
      - org.burgas.router.CommunityRouterKt.configureCommunityRouter
      - org.burgas.router.PublicationRouterKt.configurePublicationRouter